<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../assets/icon/Calculator.ico" />
  <title>Modern Calculator</title>
</head>
<body>

  <main class="calculator">

    <!-- Display -->
    <input 
      type="text" 
      class="calculator-input" 
      id="display" 
      placeholder="0" 
      readonly
    >

    <!-- Buttons -->
    <button class="item">%</button>
    <button class="item clear">C</button>
    <button class="item clear-entry">CE</button>
    <button class="item backspace">⌫</button>

    <button class="item">1/x</button>
    <button class="item">x²</button>
    <button class="item">√</button>
    <button class="item operator">÷</button>

    <button class="item number">7</button>
    <button class="item number">8</button>
    <button class="item number">9</button>
    <button class="item operator">×</button>

    <button class="item number">4</button>
    <button class="item number">5</button>
    <button class="item number">6</button>
    <button class="item operator">−</button>

    <button class="item number">1</button>
    <button class="item number">2</button>
    <button class="item number">3</button>
    <button class="item operator">+</button>

    <button class="item number zero">0</button>
    <button class="item decimal">.</button>

    <!-- Equal -->
    <button class="item_calc equals">=</button>

  </main>
</body>
<link rel="stylesheet" href="../css/style.css">
<script type="text/javascript" src="../js/script.js"></script>
</html>
